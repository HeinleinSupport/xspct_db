name: CodeQL Analysis

on:
  push:
    branches: ["main", "master"]
  pull_request:
  schedule:
    # Every Monday at 07:30 UTC
    - cron: "30 7 * * 1"

jobs:
  analyze:
    name: Analyze (Python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          # security-extended covers OWASP Top 10 patterns (injection, SSRF, path
          # traversal, insecure deserialization) in addition to the default suite.
          queries: security-extended

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get install -y --no-install-recommends libldap2-dev libsasl2-dev

      # Installing the package lets CodeQL trace imports and resolve the full
      # call graph across all backends.
      - name: Install project
        run: pip install -e ".[all]"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
